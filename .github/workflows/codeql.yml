name: CodeQL Analysis

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-rust:
    name: CodeQL Analysis (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Rust-related changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/codeql.yml'

      - name: Initialize CodeQL
        if: steps.filter.outputs.rust == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        if: steps.filter.outputs.rust == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust

  analyze-actions:
    name: CodeQL Analysis (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check workflow changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            workflows:
              - '.github/actions/**'
              - '.github/workflows/**'

      - name: Initialize CodeQL
        if: steps.filter.outputs.workflows == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        if: steps.filter.outputs.workflows == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions