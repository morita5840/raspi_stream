name: CodeQL Analysis

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}