name: CodeQL Analysis

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/**
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-rust:
    name: CodeQL Analysis (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: rust
            language: rust
            filter_name: rust
            filter_paths: |
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/codeql.yml'
          - kind: actions
            language: actions
            filter_name: workflows
            filter_paths: |
              - '.github/actions/**'
              - '.github/workflows/**'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Paths filter
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            ${{ matrix.filter_name }}:${{ matrix.filter_paths }}

      - name: Decide whether to run
        id: run
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=${{ steps.filter.outputs[matrix.filter_name] }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: ${{ steps.run.outputs.should_run == 'true' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        if: ${{ steps.run.outputs.should_run == 'true' }}
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
