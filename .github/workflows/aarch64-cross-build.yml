name: Aarch64 Cross Build

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - scripts/**
      - .github/actions/**
      - .github/workflows/aarch64-cross-build.yml
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - scripts/**
      - .github/actions/**
      - .github/workflows/aarch64-cross-build.yml
  workflow_dispatch:

permissions:
  contents: read

# Always recheck upstream sysroot metadata so restored fallback caches do not hide updates.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  RPI_SYSROOT_CHECK_INTERVAL_SECONDS: '0'

concurrency:
  group: aarch64-cross-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aarch64-build:
    name: Aarch64 Build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RUST_TARGET: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Raspberry Pi cross-build environment
        uses: ./.github/actions/setup-rpi-cross-build
        with:
          rust-target: ${{ env.RUST_TARGET }}

      - name: Build aarch64 target
        run: cargo build --target "${RUST_TARGET}"