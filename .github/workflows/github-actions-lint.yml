name: GitHub Actions Lint

on:
  push:
    branches:
      - main
    paths:
      - .github/actions/**
      - .github/workflows/**
  pull_request:
    branches:
      - main
    paths:
      - .github/actions/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-actions-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint workflows, workflow bash, and referenced local actions
        uses: raven-actions/actionlint@v2
        with:
          files: .github/workflows/*.yml, .github/workflows/*.yaml
          shellcheck: true
          pyflakes: false