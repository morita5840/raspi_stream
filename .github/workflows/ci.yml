name: CI

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/workflows/ci.yml
      - .github/actions/setup-rust-gstreamer/action.yml
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/workflows/ci.yml
      - .github/actions/setup-rust-gstreamer/action.yml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup CI environment
        uses: ./.github/actions/setup-rust-gstreamer
        with:
          rust-components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup CI environment
        uses: ./.github/actions/setup-rust-gstreamer
        with:
          rust-components: clippy

      - name: Run Clippy
        run: cargo clippy --target x86_64-unknown-linux-gnu --all-targets -- -D warnings

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup CI environment
        uses: ./.github/actions/setup-rust-gstreamer

      - name: Run unit tests
        run: cargo test --target x86_64-unknown-linux-gnu