name: Rust Checks

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/rust-checks.yml
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - .github/actions/**
      - .github/workflows/rust-checks.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Rust Format Check
            rust-components: rustfmt
            system-packages-profile: none
            command: cargo fmt --check
          - name: Rust Clippy
            rust-components: clippy
            system-packages-profile: gstreamer
            command: cargo clippy --target x86_64-unknown-linux-gnu --all-targets -- -D warnings
          - name: Rust Unit Tests
            rust-components: ''
            system-packages-profile: gstreamer
            command: cargo test --target x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup CI environment
        uses: ./.github/actions/setup-rust-gstreamer
        with:
          rust-components: ${{ matrix.rust-components }}
          system-packages-profile: ${{ matrix.system-packages-profile }}

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}