name: Cross Build

on:
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - scripts/**
      - .github/workflows/cross-build.yml
      - .github/actions/**
      - vendor/rpi-sysroot/version.txt
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/config.toml
      - src/**
      - scripts/**
      - .github/workflows/cross-build.yml
      - .github/actions/**
      - vendor/rpi-sysroot/version.txt
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aarch64-build:
    name: Build aarch64 target
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RUST_TARGET: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Raspberry Pi cross-build environment
        uses: ./.github/actions/setup-rpi-cross-build
        with:
          rust-target: ${{ env.RUST_TARGET }}

      - name: Build aarch64 target
        run: cargo build --target "${RUST_TARGET}"