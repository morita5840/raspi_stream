name: Setup Rust and GStreamer
description: Install system dependencies and Rust toolchain for CI jobs.

inputs:
  rust-components:
    description: Comma-separated Rust components to install.
    required: false
    default: ''
  system-packages-profile:
    description: Which apt package profile to install. Supported values are none, base, and gstreamer.
    required: false
    default: gstreamer
  extra-system-packages:
    description: Space-separated additional apt packages to install.
    required: false
    default: ''
  rust-target:
    description: Rust target triple to install.
    required: false
    default: x86_64-unknown-linux-gnu

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        set -euo pipefail

        profile="${{ inputs.system-packages-profile }}"
        extra_packages="${{ inputs.extra-system-packages }}"

        case "$profile" in
          none)
            exit 0
            ;;
          base)
            packages=(
              pkg-config
            )
            ;;
          gstreamer)
            packages=(
              pkg-config
              libgstreamer1.0-dev
              libgstreamer-plugins-base1.0-dev
              libgstrtspserver-1.0-dev
            )
            ;;
          *)
            printf 'Unsupported system-packages-profile: %s\n' "$profile" >&2
            exit 1
            ;;
        esac

        if [[ -n "$extra_packages" ]]; then
          IFS=' ' read -r -a extra_array <<< "$extra_packages"
          packages+=("${extra_array[@]}")
        fi

        sudo apt update
        sudo apt install -y "${packages[@]}"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.rust-components }}
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2