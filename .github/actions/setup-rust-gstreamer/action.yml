name: Setup Rust and GStreamer
description: Install system dependencies and Rust toolchain for CI jobs.

inputs:
  rust-components:
    description: Comma-separated Rust components to install.
    required: false
    default: ''
  install-system-packages:
    description: Whether to install apt packages required for GStreamer-based builds.
    required: false
    default: 'true'
  extra-system-packages:
    description: Space-separated additional apt packages to install.
    required: false
    default: ''
  rust-target:
    description: Rust target triple to install.
    required: false
    default: x86_64-unknown-linux-gnu

runs:
  using: composite
  steps:
    - name: Install system dependencies
      if: ${{ inputs.install-system-packages == 'true' }}
      shell: bash
      run: |
        extra_packages="${{ inputs.extra-system-packages }}"
        packages=(
          pkg-config
          libgstreamer1.0-dev
          libgstreamer-plugins-base1.0-dev
          libgstrtspserver-1.0-dev
        )

        if [[ -n "$extra_packages" ]]; then
          read -r -a extra_array <<< "$extra_packages"
          packages+=("${extra_array[@]}")
        fi

        sudo apt update
        sudo apt install -y "${packages[@]}"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.rust-components }}
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2