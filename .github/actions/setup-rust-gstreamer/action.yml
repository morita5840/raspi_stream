name: Setup Rust and GStreamer
description: Install system dependencies and Rust toolchain for CI jobs.

inputs:
  rust-components:
    description: Comma-separated Rust components to install.
    required: false
    default: ''
  rust-target:
    description: Rust target triple to install.
    required: false
    default: x86_64-unknown-linux-gnu

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt update
        sudo apt install -y \
          pkg-config \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgstrtspserver-1.0-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.rust-components }}
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2