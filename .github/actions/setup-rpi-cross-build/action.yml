name: Setup Raspberry Pi Cross Build
description: Prepare the cached Raspberry Pi sysroot and aarch64 Rust toolchain for cross-build jobs.

inputs:
  rust-target:
    description: Rust target triple to install.
    required: false
    default: aarch64-unknown-linux-gnu

runs:
  using: composite
  steps:
    - name: Cache Raspberry Pi sysroot artifacts
      uses: actions/cache@v4
      with:
        path: vendor/.rpi-sysroot-cache
        key: ${{ runner.os }}-rpi-sysroot-${{ hashFiles('vendor/rpi-sysroot/version.txt', 'scripts/ensure-rpi-sysroot.sh') }}
        restore-keys: |
          ${{ runner.os }}-rpi-sysroot-

    - name: Setup cross-build environment
      uses: ./.github/actions/setup-rust-gstreamer
      with:
        system-packages-profile: base
        rust-target: ${{ inputs.rust-target }}
        extra-system-packages: >-
          gcc-aarch64-linux-gnu
          binutils-aarch64-linux-gnu
          parted
          e2fsprogs
          xz-utils
          dpkg-dev
          python3

    - name: Prepare Raspberry Pi sysroot
      shell: bash
      run: |
        set -euo pipefail
        ./scripts/ensure-rpi-sysroot.sh