name: Setup Raspberry Pi Cross Build
description: Prepare the cached Raspberry Pi sysroot and aarch64 Rust toolchain for cross-build jobs.

inputs:
  rust-target:
    description: Rust target triple to install.
    required: false
    default: aarch64-unknown-linux-gnu

runs:
  using: composite
  steps:
    - name: Resolve Raspberry Pi sysroot cache key
      id: sysroot-cache-key
      shell: bash
      run: |
        set -euo pipefail

        latest_sha=$(./scripts/ensure-rpi-sysroot.sh --print-latest-sha256 || true)
        if [[ -z "$latest_sha" ]]; then
          latest_sha=fallback
        fi
        echo "latest-sha=$latest_sha" >> "$GITHUB_OUTPUT"

    - name: Cache Raspberry Pi sysroot artifacts
      uses: actions/cache@v4
      with:
        path: vendor/.rpi-sysroot-cache
        key: ${{ runner.os }}-rpi-sysroot-${{ steps.sysroot-cache-key.outputs.latest-sha }}-${{ hashFiles('scripts/ensure-rpi-sysroot.sh') }}
        restore-keys: |
          ${{ runner.os }}-rpi-sysroot-

    - name: Setup cross-build environment
      uses: ./.github/actions/setup-rust-gstreamer
      with:
        system-packages-profile: base
        rust-target: ${{ inputs.rust-target }}
        extra-system-packages: >-
          gcc-aarch64-linux-gnu
          binutils-aarch64-linux-gnu
          parted
          e2fsprogs
          xz-utils
          dpkg-dev
          python3

    - name: Prepare Raspberry Pi sysroot
      shell: bash
      run: |
        set -euo pipefail
        ./scripts/ensure-rpi-sysroot.sh